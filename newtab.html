<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>

  <!-- 배경 오버레이 (이미지 위에 반투명 다크 레이어) -->
  <div id="bg-overlay"></div>

  <!-- 배경 크레딧 + 새로고침 버튼 -->
  <div id="bg-controls">
    <span id="bg-credit">Photo: Picsum Photos</span>
    <button id="btn-refresh-bg" title="새 배경 이미지">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
      새 이미지
    </button>
  </div>

  <!-- 좌측 하단 설정 버튼 -->
  <button id="btn-settings" title="설정">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>

  <!-- 메인 컨텐츠 -->
  <main id="main">

    <!-- 검색바 -->
    <div id="search-wrapper">
      <form id="search-form" action="https://www.google.com/search" method="get" target="_blank">
        <div id="search-box">
          <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            type="text"
            name="q"
            id="search-input"
            placeholder="Google 검색"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </form>
    </div>

    <!-- Speed Dial 그리드 -->
    <div id="grid"></div>

  </main>

  <!-- 사이트 추가/편집 모달 -->
  <div id="modal-backdrop" class="hidden">
    <div id="modal">
      <h2 id="modal-title">사이트 추가</h2>

      <div class="form-group">
        <label for="input-url">URL</label>
        <input type="url" id="input-url" placeholder="https://example.com" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="input-name">이름</label>
        <input type="text" id="input-name" placeholder="사이트 이름" autocomplete="off" />
      </div>

      <!-- favicon 미리보기 -->
      <div id="favicon-preview-row">
        <img id="favicon-preview" src="" alt="" />
        <span id="favicon-status"></span>
      </div>

      <div id="modal-actions">
        <button id="btn-delete" class="btn-danger hidden">삭제</button>
        <div id="modal-actions-right">
          <button id="btn-cancel" class="btn-secondary">취소</button>
          <button id="btn-save" class="btn-primary">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div id="modal-settings-backdrop" class="hidden">
    <div id="modal-settings" class="modal-content">
      <h2>설정</h2>
      
      <div class="settings-section">
        <h3>그리드 레이아웃</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="input-cols">가로 열 개수</label>
            <input type="number" id="input-cols" min="1" max="20" />
          </div>
          <div class="form-group">
            <label for="input-card-width">카드 너비 (px)</label>
            <input type="number" id="input-card-width" min="40" max="300" />
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3>검색 엔진</h3>
        <div class="form-group">
          <select id="select-search-engine">
            <option value="https://www.google.com/search">Google</option>
            <option value="https://search.naver.com/search.naver">Naver</option>
            <option value="https://www.bing.com/search">Bing</option>
            <option value="https://duckduckgo.com/">DuckDuckGo</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <div class="toggle-group">
          <span>배경화면 자동 새로고침</span>
          <label class="switch">
            <input type="checkbox" id="check-auto-refresh">
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>데이터 및 북마크 관리</h3>
        <div class="form-row">
          <button id="btn-import-html" class="btn-secondary" style="flex: 1;">가져오기 (.html)</button>
          <button id="btn-export-html" class="btn-secondary" style="flex: 1;">내보내기 (.html)</button>
        </div>
        <input type="file" id="input-bookmark-file" accept=".html" class="hidden" />
      </div>

      <div id="settings-actions">
        <button id="btn-settings-cancel" class="btn-secondary">취소</button>
        <button id="btn-settings-save" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
